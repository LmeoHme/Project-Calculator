<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="index.css">
    <script type="module" src="index.js"></script>
</head>
<body>
    <main>
        <section id="calculator-screen" class="screen">
            <input type="text" class="screen-inputBox" name="inputBox">
            <div class="screen-outputBox"></div>
        </section>

        <section id="buttons" class="buttons">
            <div class="main-area">
                <ul class="special-buttons">
                    <li>Records</li>
                    <li>All clear</li>
                    <li>Delete</li>
                </ul>

                <ul id="records-list" class="list-container"></ul>

                <ul id="number-buttons" class="numbers-list">
                    <li>1</li>
                    <li>2</li>
                    <li>3</li>
                    <li>4</li>
                    <li>5</li>
                    <li>6</li>
                    <li>7</li>
                    <li>8</li>
                    <li>9</li>
                    <li>00</li>
                    <li>0</li>
                    <li>.</li>
                </ul>
            </div>

            <div class="operator-buttons">
                <ul>
                    <li>+</li>
                    <li>-</li>
                    <li>x</li>
                    <li>/</li>
                    <li class="equal-operator">=</li>
                </ul>
            </div>
        </section>
    </main>
</body>
</html>
